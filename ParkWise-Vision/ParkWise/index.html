<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1014">
<title>ParkWise</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ParkWise">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b1014;
  --bg-soft:#111922;
  --panel:rgba(18,27,35,.92);
  --panel-2:rgba(26,38,49,.9);
  --line:rgba(187,230,255,.12);
  --line-strong:rgba(187,230,255,.2);
  --text:#eef7fb;
  --muted:rgba(238,247,251,.66);
  --faint:rgba(238,247,251,.38);
  --brand:#29c7ac;
  --brand-2:#67e8c7;
  --accent:#ffb84d;
  --danger:#ff6a7c;
  --ev:#7cc7ff;
  --success:#77e588;
  --radius-sm:16px;
  --radius-md:24px;
  --radius-lg:32px;
  --shadow:0 24px 60px rgba(0,0,0,.32);
  --safe-top:max(16px,env(safe-area-inset-top));
  --safe-bottom:max(18px,env(safe-area-inset-bottom));
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Space Grotesk",sans-serif;overscroll-behavior:none}
body{
  overflow:hidden;
  background:
    radial-gradient(circle at top left,rgba(41,199,172,.2),transparent 34%),
    radial-gradient(circle at 85% 20%,rgba(255,184,77,.14),transparent 26%),
    linear-gradient(180deg,#071014 0%,#0b1014 35%,#10171d 100%);
}
button,input,select,textarea{font:inherit}
button{border:none;background:none;color:inherit}
#root{height:100%}
.app{
  height:100%;
  width:100%;
  display:flex;
  flex-direction:column;
  position:relative;
}
.app::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg,rgba(255,255,255,.02),transparent 20%),
    repeating-linear-gradient(135deg,rgba(255,255,255,.018) 0 2px,transparent 2px 14px);
  opacity:.35;
  pointer-events:none;
}
.screen{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:var(--safe-top) 18px calc(var(--safe-bottom) + 96px);
  scroll-behavior:smooth;
}
.screen::-webkit-scrollbar{display:none}
.stack{display:flex;flex-direction:column;gap:12px}
.stack.fill{min-height:calc(100vh - var(--safe-top) - var(--safe-bottom) - 96px);min-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 96px);justify-content:center}
.topbar{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:10px;
}
.status{
  font-size:14px;
  font-weight:700;
  letter-spacing:-.02em;
}
.statusmeta{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--faint);
  font-size:12px;
}
.hero{
  padding:24px 20px;
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  background:
    linear-gradient(145deg,rgba(23,35,43,.92),rgba(11,17,22,.94)),
    radial-gradient(circle at top right,rgba(103,232,199,.16),transparent 34%);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.hero::after{
  content:"";
  position:absolute;
  inset:auto -50px -70px auto;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,184,77,.18),transparent 70%);
}
.homehead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:18px;
}
.homebrandstage{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:calc(100vh - var(--safe-top) - var(--safe-bottom) - 96px);
  min-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - 96px);
  padding:10px 8px 16px;
  text-align:center;
}
.homebrandlogo{
  width:min(320px,82vw);
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
}
.homebrandlogo img{
  width:100%;
  height:100%;
  object-fit:contain;
  transform:scale(1.45);
  transform-origin:center;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.42));
}
.hometagline{
  margin-top:28px;
  color:#eef3fb;
  font-size:36px;
  font-weight:700;
  line-height:1.18;
  letter-spacing:-.02em;
}
.homebrandcta{
  margin-top:40px;
  min-height:56px;
  min-width:200px;
  padding:0 32px;
  border-radius:20px;
  border:none;
  background:linear-gradient(135deg,var(--brand),#1fa38f);
  color:#03261f;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease;
  box-shadow:0 12px 36px rgba(41,199,172,.3);
}
.homebrandcta:active{transform:scale(.97)}
.hometagline span{
  display:block;
}
.homebrand{
  display:flex;
  align-items:center;
  gap:12px;
}
.homelogo{
  width:64px;
  height:64px;
  border-radius:8px;
  object-fit:contain;
  padding:6px;
  background:linear-gradient(145deg,rgba(41,199,172,.2),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 14px 34px rgba(0,0,0,.3);
}
.homebrandtitle{
  font-size:20px;
  font-weight:700;
  letter-spacing:0;
}
.homebrandsub{
  margin-top:3px;
  color:var(--muted);
  font-size:13px;
}
.homehero{
  padding:0;
  border-radius:8px;
  background:#091115;
  box-shadow:var(--shadow);
}
.homehero::after{display:none}
.homemap{
  position:relative;
  min-height:306px;
  overflow:hidden;
  border-radius:8px;
  border:1px solid var(--line);
  background:
    linear-gradient(180deg,rgba(8,14,18,.18),rgba(8,14,18,.72) 44%,rgba(8,14,18,.98) 100%),
    #071017;
}
.homemap::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,rgba(8,14,18,.98),rgba(8,14,18,.64) 54%,rgba(8,14,18,.2)),
    linear-gradient(180deg,rgba(8,14,18,.02),rgba(8,14,18,.86) 62%,rgba(8,14,18,.98));
  pointer-events:none;
}
.homemap .mapwrap{
  border:0;
  border-radius:0;
  opacity:.54;
  transform:scale(1.15) translateY(22px);
  transform-origin:center top;
  filter:saturate(1.08) contrast(1.05);
}
.homepath{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
}
.homepath svg{
  display:block;
  width:100%;
  height:100%;
}
.homepulse{
  position:absolute;
  right:52px;
  top:102px;
  z-index:2;
  width:16px;
  height:16px;
  border-radius:999px;
  background:var(--brand-2);
  box-shadow:0 0 0 10px rgba(103,232,199,.16),0 0 30px rgba(103,232,199,.68);
  animation:homePulse 1.8s ease-in-out infinite;
}
.homepulse::after{
  content:attr(data-spot);
  position:absolute;
  right:20px;
  top:-12px;
  padding:7px 9px;
  border-radius:8px;
  background:rgba(7,13,16,.88);
  border:1px solid rgba(103,232,199,.28);
  color:var(--brand-2);
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  font-weight:700;
}
.homemapcontent{
  position:absolute;
  inset:auto 0 0;
  padding:18px;
  z-index:3;
}
.homesuggestion{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:8px;
  background:rgba(7,13,16,.72);
  border:1px solid rgba(103,232,199,.2);
  color:var(--brand-2);
  font-size:12px;
  font-weight:700;
  backdrop-filter:blur(14px);
}
.homesuggestion span{
  width:7px;
  height:7px;
  border-radius:999px;
  background:currentColor;
  box-shadow:0 0 14px currentColor;
}
.homekicker{
  color:var(--brand-2);
  font-size:11px;
  font-weight:700;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.hometitle{
  margin-top:8px;
  font-size:30px;
  line-height:1.02;
  letter-spacing:0;
  max-width:12ch;
  text-shadow:0 10px 26px rgba(0,0,0,.5);
}
.homecopy{
  margin-top:8px;
  color:rgba(238,247,251,.78);
  font-size:14px;
  line-height:1.45;
  max-width:28ch;
}
.homestats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}
.homestat{
  min-height:62px;
  padding:10px;
  border-radius:8px;
  background:rgba(7,13,16,.88);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(14px);
}
.homestat span{
  display:block;
  color:var(--faint);
  font-size:11px;
}
.homestat strong{
  display:block;
  margin-top:5px;
  font-family:"IBM Plex Mono",monospace;
  font-size:21px;
  letter-spacing:0;
}
.homepanel{
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(18,27,35,.96),rgba(13,20,27,.92));
  border-radius:8px;
  padding:14px;
  box-shadow:var(--shadow);
}
.homeprimaryrow{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
  margin-top:10px;
}
.homeeta{
  min-width:84px;
  padding:13px 12px;
  border-radius:8px;
  background:rgba(255,184,77,.1);
  border:1px solid rgba(255,184,77,.2);
  text-align:center;
}
.homeeta strong{
  display:block;
  font-family:"IBM Plex Mono",monospace;
  font-size:19px;
  letter-spacing:0;
  color:#ffd28a;
}
.homeeta span{
  display:block;
  margin-top:2px;
  color:var(--faint);
  font-size:11px;
}
.homepaneltop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}
.homepaneltitle{
  font-size:17px;
  font-weight:700;
  letter-spacing:0;
}
.homefeed{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}
.homefeedrow{
  display:grid;
  grid-template-columns:34px 1fr auto;
  align-items:center;
  gap:10px;
  min-height:42px;
}
.homefeedicon{
  width:34px;
  height:34px;
  border-radius:8px;
  display:grid;
  place-items:center;
  background:rgba(41,199,172,.12);
  color:var(--brand-2);
  font-family:"IBM Plex Mono",monospace;
  font-weight:700;
  font-size:12px;
}
.homefeedrow strong{
  display:block;
  font-size:14px;
  letter-spacing:0;
}
.homefeedrow span{
  display:block;
  margin-top:3px;
  color:var(--faint);
  font-size:12px;
}
.homefeedvalue{
  font-family:"IBM Plex Mono",monospace;
  font-weight:700;
  color:var(--text);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.18em;
  color:var(--brand-2);
  margin-bottom:14px;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 16px currentColor;
}
.title{
  font-size:34px;
  line-height:.95;
  letter-spacing:-.06em;
  max-width:12ch;
}
.subtitle{
  margin-top:12px;
  color:var(--muted);
  line-height:1.55;
  max-width:32ch;
}
.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.metric,.card{
  border:1px solid var(--line);
  background:var(--panel);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow);
}
.metric{
  padding:14px 12px;
  min-height:92px;
}
.metriclabel{
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--faint);
}
.metricvalue{
  margin-top:8px;
  font-size:28px;
  font-weight:700;
  letter-spacing:-.06em;
}
.metricvalue.small{font-size:20px}
.card{padding:18px}
.sectiontitle{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.16em;
  color:var(--faint);
  margin-bottom:12px;
}
.row{
  display:flex;
  align-items:center;
  gap:10px;
}
.space{justify-content:space-between}
.pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:600;
  border:1px solid transparent;
}
.pill.live{background:rgba(41,199,172,.12);color:var(--brand-2);border-color:rgba(41,199,172,.22)}
.pill.warn{background:rgba(255,184,77,.12);color:#ffd28a;border-color:rgba(255,184,77,.24)}
.pill.ok{background:rgba(119,229,136,.12);color:var(--success);border-color:rgba(119,229,136,.24)}
.pill.bad{background:rgba(255,106,124,.12);color:#ff9caa;border-color:rgba(255,106,124,.24)}
.vehiclegrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.vehicle{
  min-height:120px;
  border-radius:22px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
  padding:14px 10px;
  text-align:left;
  transition:transform .18s ease,border-color .18s ease,background .18s ease;
}
.vehicle:active,.primary:active,.secondary:active,.ghost:active,.issue:active,.iconbtn:active{transform:scale(.98)}
.vehicle.selected{
  border-color:rgba(41,199,172,.48);
  background:linear-gradient(180deg,rgba(41,199,172,.17),rgba(41,199,172,.06));
}
.vehicleicon{
  width:42px;
  height:42px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.06);
  margin-bottom:16px;
  font-size:20px;
}
.vehiclelabel{font-size:15px;font-weight:700}
.vehiclemeta{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.45}
.progresswrap{
  display:flex;
  align-items:center;
  gap:18px;
}
.ring{
  width:132px;
  aspect-ratio:1;
  flex-shrink:0;
}
.legend{
  display:flex;
  flex-direction:column;
  gap:10px;
  width:100%;
}
.legendrow{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:var(--muted);
}
.legendrow strong{color:var(--text)}
.mapwrap{
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
  background:#071017;
}
.mapwrap svg{
  display:block;
  width:100%;
  height:auto;
}
.spotid{
  font-family:"IBM Plex Mono",monospace;
  font-size:68px;
  font-weight:700;
  line-height:.95;
  letter-spacing:-.08em;
  color:var(--brand-2);
}
.monocode{
  font-family:"IBM Plex Mono",monospace;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  padding:9px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  color:var(--muted);
  font-size:12px;
  border:1px solid rgba(255,255,255,.06);
}
.route{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.step{
  display:flex;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.step:last-child{border-bottom:none;padding-bottom:0}
.stepnum{
  width:28px;
  height:28px;
  border-radius:10px;
  flex-shrink:0;
  display:grid;
  place-items:center;
  background:rgba(41,199,172,.12);
  color:var(--brand-2);
  font-size:12px;
  font-weight:700;
}
.steptext{
  color:var(--muted);
  line-height:1.55;
  font-size:14px;
}
.timer{
  font-family:"IBM Plex Mono",monospace;
  font-size:42px;
  letter-spacing:-.05em;
  color:#ffd28a;
}
.issue{
  width:100%;
  border-radius:22px;
  border:1px solid var(--line);
  padding:15px 14px;
  background:rgba(255,255,255,.02);
  display:flex;
  align-items:center;
  gap:12px;
  text-align:left;
}
.issue.selected{
  border-color:rgba(255,184,77,.45);
  background:rgba(255,184,77,.08);
}
.issueicon{
  width:42px;
  height:42px;
  border-radius:14px;
  display:grid;
  place-items:center;
  flex-shrink:0;
  font-size:18px;
}
.issuecopy{
  flex:1;
}
.issuecopy strong{
  display:block;
  font-size:14px;
}
.issuecopy span{
  display:block;
  margin-top:4px;
  color:var(--faint);
  font-size:12px;
}
.floatingbar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:10;
  padding:8px 16px calc(var(--safe-bottom) + 8px);
  background:linear-gradient(180deg,rgba(11,16,20,0),rgba(11,16,20,.88) 24%,rgba(11,16,20,.98) 100%);
  backdrop-filter:blur(18px);
}
.floatinginner{
  display:flex;
  gap:10px;
  padding:8px;
  border:1px solid var(--line);
  background:rgba(10,16,20,.82);
  border-radius:26px;
  box-shadow:var(--shadow);
}
.primary,.secondary,.ghost,.iconbtn{
  min-height:52px;
  border-radius:18px;
  font-weight:700;
  transition:transform .18s ease,background .18s ease,border-color .18s ease;
}
.primary{
  flex:1;
  background:linear-gradient(135deg,var(--brand),#1fa38f);
  color:#03261f;
}
.secondary{
  flex:1;
  border:1px solid var(--line-strong);
  background:rgba(255,255,255,.04);
  color:var(--text);
}
.ghost{
  flex:1;
  color:var(--danger);
  background:rgba(255,106,124,.08);
  border:1px solid rgba(255,106,124,.18);
}
.iconbtn{
  width:56px;
  flex-shrink:0;
  border:1px solid var(--line-strong);
  background:rgba(255,255,255,.04);
  display:grid;
  place-items:center;
}
.helper{
  color:var(--muted);
  line-height:1.55;
  font-size:14px;
}
.notice{
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(255,184,77,.18);
  background:rgba(255,184,77,.08);
  color:#ffe1ab;
  line-height:1.55;
  font-size:13px;
}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(var(--safe-bottom) + 96px);
  transform:translate(-50%,16px);
  width:min(320px,calc(100vw - 28px));
  padding:14px 16px;
  border-radius:18px;
  background:rgba(8,14,18,.95);
  border:1px solid rgba(41,199,172,.28);
  color:var(--brand-2);
  opacity:0;
  transition:opacity .26s ease,transform .26s ease;
  pointer-events:none;
  box-shadow:var(--shadow);
  z-index:20;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.fade{animation:fade .45s ease both}
@keyframes fade{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes homePulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.18)}
}
@media (min-width: 700px){
  body{background:#0b1014}
  .screen{max-width:460px;margin:0 auto;padding-left:20px;padding-right:20px}
  .floatingbar{display:flex;justify-content:center}
  .floatinginner{width:min(460px,calc(100vw - 24px))}
}
/* cursor */
.vehicle,.issue,.primary,.secondary,.ghost,.iconbtn,.homebrandcta{cursor:pointer}
/* hover */
@media(hover:hover){
  .vehicle:hover{border-color:rgba(41,199,172,.28);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
  .vehicle.selected:hover{border-color:rgba(41,199,172,.62)}
  .primary:hover{background:linear-gradient(135deg,#34d4b8,#25b9a2);box-shadow:0 14px 42px rgba(41,199,172,.44)}
  .secondary:hover{background:rgba(255,255,255,.07);border-color:rgba(187,230,255,.32)}
  .ghost:hover{background:rgba(255,106,124,.14);border-color:rgba(255,106,124,.28)}
  .iconbtn:hover{background:rgba(255,255,255,.08);border-color:rgba(187,230,255,.32)}
  .issue:hover:not(.selected){border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.04)}
  .homebrandcta:hover{transform:translateY(-2px);box-shadow:0 18px 44px rgba(41,199,172,.46)}
}
/* vehicle icon state */
.vehicleicon{color:rgba(238,247,251,.55)}
.vehicleicon svg{display:block}
.vehicle.selected .vehicleicon{background:rgba(41,199,172,.18);color:var(--brand-2)}
/* issue icon */
.issueicon svg{display:block}
/* welcome feature pills */
.homefeatures{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.homefeat{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-size:12px;font-weight:500;letter-spacing:0}
.homefeat svg{flex-shrink:0;opacity:.75}
/* reduced motion */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}

/* ============================================================
   WOW REDESIGN — glassmorphism · gradient text · shimmer · orbs
   ============================================================ */

/* Animated ambient orbs */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;will-change:transform}
.orb1{width:420px;height:420px;background:radial-gradient(circle,rgba(41,199,172,.28),transparent 68%);top:-130px;left:-110px;filter:blur(72px);animation:orbDrift1 24s ease-in-out infinite}
.orb2{width:320px;height:320px;background:radial-gradient(circle,rgba(255,184,77,.18),transparent 68%);top:38%;right:-90px;filter:blur(62px);animation:orbDrift2 30s ease-in-out infinite}
.orb3{width:260px;height:260px;background:radial-gradient(circle,rgba(124,199,255,.22),transparent 68%);bottom:28%;left:8%;filter:blur(58px);animation:orbDrift3 20s ease-in-out infinite}
@keyframes orbDrift1{0%,100%{transform:translate(0,0)}33%{transform:translate(64px,52px)}66%{transform:translate(-28px,72px)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-52px,64px)}}
@keyframes orbDrift3{0%,100%{transform:translate(0,0)}40%{transform:translate(52px,-36px)}70%{transform:translate(-18px,48px)}}

/* z-index layer order */
.app{position:relative;z-index:1}
.screen,.floatingbar,.toast{position:relative;z-index:1}
.floatingbar{z-index:11!important}
.toast{z-index:21!important}

/* Glassmorphism cards */
.card{
  background:rgba(12,20,28,.76)!important;
  backdrop-filter:blur(32px)!important;
  -webkit-backdrop-filter:blur(32px)!important;
  border:1px solid rgba(255,255,255,.10)!important;
  box-shadow:0 24px 64px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.07)!important;
}
.metric{
  background:rgba(12,20,28,.68)!important;
  backdrop-filter:blur(24px)!important;
  -webkit-backdrop-filter:blur(24px)!important;
  border:1px solid rgba(255,255,255,.09)!important;
  box-shadow:0 8px 28px rgba(0,0,0,.28)!important;
}
.hero{
  background:linear-gradient(145deg,rgba(41,199,172,.18) 0%,rgba(12,20,28,.96) 55%,rgba(8,14,20,.98) 100%)!important;
  border:1px solid rgba(41,199,172,.28)!important;
  box-shadow:0 32px 80px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.09)!important;
}

/* Gradient text */
.hometagline{
  background:linear-gradient(140deg,#ffffff 0%,#a5f3e8 45%,#93c5fd 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-size:42px!important;
  line-height:1.08!important;
}
.spotid{
  background:linear-gradient(135deg,#67e8c7 0%,#29c7ac 45%,#93c5fd 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-size:88px!important;
  letter-spacing:-.09em!important;
}
.timer{
  background:linear-gradient(135deg,#ffe4aa,#ffb84d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-size:48px!important;
}

/* Shimmer primary button */
@keyframes shimmerBtn{0%{background-position:-200% center}100%{background-position:200% center}}
.primary{
  background:linear-gradient(90deg,#1da892 0%,#29c7ac 25%,#6ee8cc 50%,#29c7ac 75%,#1da892 100%)!important;
  background-size:200% auto!important;
  animation:shimmerBtn 3.5s linear infinite;
  box-shadow:0 12px 40px rgba(41,199,172,.32)!important;
  letter-spacing:.01em;
}
.homebrandcta{
  background:linear-gradient(90deg,#1da892 0%,#29c7ac 25%,#6ee8cc 50%,#29c7ac 75%,#1da892 100%)!important;
  background-size:200% auto!important;
  animation:shimmerBtn 3.5s linear infinite;
  box-shadow:0 12px 44px rgba(41,199,172,.38)!important;
  display:inline-flex!important;
  align-items:center!important;
  justify-content:center!important;
  gap:8px!important;
  letter-spacing:.02em;
  border-radius:22px!important;
}

/* Metric numbers — teal glow */
.metricvalue{color:#67e8c7!important;text-shadow:0 0 28px rgba(103,232,199,.35)}
.metricvalue.small{color:#67e8c7!important}

/* Floating bar premium glass */
.floatinginner{
  background:rgba(6,10,16,.92)!important;
  border:1px solid rgba(255,255,255,.13)!important;
  backdrop-filter:blur(40px)!important;
  -webkit-backdrop-filter:blur(40px)!important;
  box-shadow:0 -2px 32px rgba(0,0,0,.28)!important;
}

/* Vehicle selected glow */
.vehicle.selected{
  box-shadow:0 0 0 1px rgba(41,199,172,.2),0 10px 40px rgba(41,199,172,.18)!important;
}

/* Pill live glow */
.pill.live{box-shadow:0 0 16px rgba(41,199,172,.25)}

/* Colored legend rows */
.legendrow:nth-child(1) strong{color:var(--success);text-shadow:0 0 14px rgba(119,229,136,.3)}
.legendrow:nth-child(2) strong{color:var(--ev);text-shadow:0 0 14px rgba(124,199,255,.3)}
.legendrow:nth-child(3) strong{color:var(--accent);text-shadow:0 0 14px rgba(255,184,77,.3)}
.legendrow:nth-child(4) strong{color:var(--brand-2);text-shadow:0 0 14px rgba(103,232,199,.3)}
.legendrow{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.legendrow:last-child{border-bottom:none}
.legendrow strong{font-family:"IBM Plex Mono",monospace;font-size:15px}

/* Welcome screen */
.welsubtitle{
  margin-top:14px;
  color:rgba(238,247,251,.52);
  font-size:15px;
  line-height:1.6;
  text-align:center;
  max-width:26ch;
}
.wellivebar{
  display:flex;
  align-items:center;
  margin-top:28px;
  padding:16px 22px;
  border-radius:22px;
  background:rgba(12,20,28,.72);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
  width:100%;
  max-width:290px;
  justify-content:center;
  gap:0;
}
.welliveitem{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.wellivenum{
  font-family:"IBM Plex Mono",monospace;
  font-size:24px;
  font-weight:700;
  color:var(--brand-2);
  letter-spacing:-.04em;
  text-shadow:0 0 20px rgba(103,232,199,.38);
}
.welliveitem>span{color:var(--faint);font-size:11px;letter-spacing:.06em}
.wellivediv{width:1px;height:36px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 4px}

/* Step number upgrade */
.stepnum{
  background:rgba(41,199,172,.16)!important;
  border:1px solid rgba(41,199,172,.28)!important;
  color:var(--brand-2)!important;
  box-shadow:0 0 12px rgba(41,199,172,.14)!important;
}

/* Eyebrow glow */
.eyebrow{text-shadow:0 0 18px rgba(103,232,199,.3)}
.dot{box-shadow:0 0 10px currentColor,0 0 22px currentColor!important}

/* Topbar pill sync glow */
.pill.ok{box-shadow:0 0 12px rgba(119,229,136,.2)}
.pill.warn{box-shadow:0 0 12px rgba(255,184,77,.2)}

/* Notice upgrade */
.notice{
  background:rgba(255,184,77,.1)!important;
  border:1px solid rgba(255,184,77,.22)!important;
  box-shadow:0 8px 28px rgba(255,184,77,.08)!important;
}

/* Home stat value glow */
.homestat strong{text-shadow:0 0 18px rgba(103,232,199,.3)}
.homeeta strong{text-shadow:0 0 18px rgba(255,184,77,.3)}

/* ===== AVAILABILITY SCREEN v2 ===== */
.availnum{
  font-family:"IBM Plex Mono",monospace;
  font-size:80px;
  font-weight:700;
  line-height:1;
  letter-spacing:-.06em;
  background:linear-gradient(135deg,#ffffff 0%,#67e8c7 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.availsub{margin-top:6px;color:var(--muted);font-size:15px;font-weight:500}
.availbar{
  margin-top:22px;
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.07);
  overflow:hidden;
}
.availbarfill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#ffb84d 0%,#29c7ac 60%,#67e8c7 100%);
  box-shadow:0 0 16px rgba(103,232,199,.4);
  transition:width .9s cubic-bezier(.34,1.4,.64,1);
}
.availpct{
  margin-top:9px;
  color:var(--faint);
  font-size:12px;
  font-family:"IBM Plex Mono",monospace;
  letter-spacing:.04em;
}
.availtypes{
  display:flex;
  gap:8px;
  margin-top:20px;
}
.availtype{
  flex:1;
  padding:14px 6px 12px;
  border-radius:20px;
  background:rgba(255,255,255,.03);

  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:border-color .18s;
}
.availtype strong{
  font-family:"IBM Plex Mono",monospace;
  font-size:24px;
  font-weight:700;
  letter-spacing:-.04em;
  line-height:1;
}
.availtype span{
  font-size:10px;

  letter-spacing:.1em;

}
.availtype .availicon{
  width:30px;height:30px;border-radius:10px;
  display:grid;place-items:center;
}
.availtype.reg{border-color:rgba(119,229,136,.2);background:rgba(119,229,136,.04)}
.availtype.reg strong{color:var(--success);text-shadow:0 0 18px rgba(119,229,136,.35)}
.availtype.reg .availicon{background:rgba(119,229,136,.14);color:var(--success)}
.availtype.ev{border-color:rgba(124,199,255,.2);background:rgba(124,199,255,.04)}
.availtype.ev strong{color:var(--ev);text-shadow:0 0 18px rgba(124,199,255,.35)}
.availtype.ev .availicon{background:rgba(124,199,255,.14);color:var(--ev)}
.availtype.ac{border-color:rgba(255,184,77,.2);background:rgba(255,184,77,.04)}
.availtype.ac strong{color:var(--accent);text-shadow:0 0 18px rgba(255,184,77,.35)}
.availtype.ac .availicon{background:rgba(255,184,77,.14);color:var(--accent)}

/* Vehicle rows */
.vehlist{display:flex;flex-direction:column;gap:10px}
.vehrow{
  display:flex;
  align-items:center;
  gap:14px;
  width:100%;
  padding:17px 16px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.03);
  text-align:left;
  cursor:pointer;
  transition:border-color .18s ease,background .2s ease,box-shadow .2s ease;
}
.vehrow.selected{
  border-color:rgba(41,199,172,.5);
  background:linear-gradient(135deg,rgba(41,199,172,.15),rgba(41,199,172,.04));

}
.vehrowicon{
  width:52px;
  height:52px;
  border-radius:18px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.06);
  flex-shrink:0;
  color:rgba(238,247,251,.42);
  transition:background .18s,color .18s;
}
.vehrow.selected .vehrowicon{
  background:rgba(41,199,172,.18);
  color:var(--brand-2);
}
.vehrowinfo{flex:1;min-width:0}
.vehrowlabel{font-size:16px;font-weight:700;letter-spacing:-.01em}
.vehrowmeta{margin-top:4px;color:var(--muted);font-size:13px;line-height:1.45}
.vehrowcount{text-align:right;flex-shrink:0}
.vehrowcount strong{

  font-family:"IBM Plex Mono",monospace;
  font-size:24px;

  letter-spacing:-.04em;

  text-shadow:0 0 20px rgba(103,232,199,.32);
}
.vehrowcount span{display:block;font-size:11px;color:var(--faint);margin-top:2px;letter-spacing:.04em}
.vehrowarrow{color:rgba(238,247,251,.18);flex-shrink:0;transition:color .18s,transform .2s}
.vehrow.selected .vehrowarrow{color:var(--brand-2);transform:translateX(3px)}
@media(hover:hover){
  .vehrow:hover:not(.selected){border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.05)}
  .vehrow.selected:hover{border-color:rgba(41,199,172,.68)}
}

/* ===== LOGIN SCREEN ===== */
.loginwrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100dvh - var(--safe-top) - var(--safe-bottom));
  padding:20px;text-align:center;
}
.loginlogo{width:min(260px,72vw);height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.loginlogo img{width:100%;height:100%;object-fit:contain;transform:scale(1.3);filter:drop-shadow(0 12px 24px rgba(0,0,0,.42))}
.logintitle{
  margin-top:6px;font-size:30px;font-weight:700;line-height:1.12;letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff 0%,#a5f3e8 48%,#93c5fd 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.loginsubtitle{margin-top:10px;color:var(--muted);font-size:15px;line-height:1.5}
.logincard{
  width:100%;max-width:320px;margin-top:26px;padding:22px 20px;
  border-radius:26px;background:rgba(12,20,28,.78);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  box-shadow:0 24px 64px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.07);
  text-align:left;
}
.logininput{display:flex;flex-direction:column;gap:8px}
.loginlabel{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.inputwrap{position:relative;display:flex;align-items:center}
.inputicon{position:absolute;left:14px;color:var(--faint);pointer-events:none;flex-shrink:0}
.textinput{
  width:100%;padding:14px 14px 14px 46px;border-radius:16px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--text);font-size:15px;font-family:"Space Grotesk",sans-serif;outline:none;
  transition:border-color .18s,background .18s;
}
.textinput::placeholder{color:var(--faint)}
.textinput:focus{border-color:rgba(41,199,172,.52);background:rgba(41,199,172,.07)}
.loginmeta{margin-top:14px;color:var(--faint);font-size:12px;text-align:center;line-height:1.5}

/* ===== USER AVATAR (topbar) ===== */
.useravatar{
  width:38px;height:38px;border-radius:50%;
  display:grid;place-items:center;
  font-size:13px;font-weight:700;letter-spacing:0;
  border:1.5px solid;cursor:pointer;flex-shrink:0;
  transition:opacity .18s,transform .18s;
}
@media(hover:hover){.useravatar:hover{opacity:.8;transform:scale(1.06)}}
.useravatar:active{transform:scale(.95)}

/* ===== PROFILE SCREEN ===== */
.profileavatarlg{
  width:68px;height:68px;border-radius:50%;
  display:grid;place-items:center;
  font-size:22px;font-weight:700;
  border:2px solid;flex-shrink:0;
}
.profilename{font-size:22px;font-weight:700;letter-spacing:-.02em}
.profilemeta{margin-top:4px;color:var(--muted);font-size:14px}

/* ===== WELCOME GREETING ===== */
.welgreeting{
  margin-top:14px;font-size:17px;font-weight:500;
  color:rgba(238,247,251,.6);letter-spacing:-.01em;
}

/* ===== LOGIN TABS ===== */
.logintabs{
  display:flex;width:100%;max-width:320px;margin-top:22px;
  padding:4px;border-radius:18px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);gap:4px;
}
.logintab{
  flex:1;padding:10px;border-radius:14px;
  font-size:14px;font-weight:600;color:var(--muted);
  transition:background .18s,color .18s,border-color .18s;
  cursor:pointer;border:1px solid transparent;
}
.logintab.active{
  background:rgba(41,199,172,.15);color:var(--brand-2);
  border-color:rgba(41,199,172,.26);
}

/* ===== ACTIVE SESSION AVATAR PULSE ===== */
@keyframes avatarPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(41,199,172,.55)}
  60%{box-shadow:0 0 0 7px rgba(41,199,172,0)}
}
.useravatar--active{animation:avatarPulse 2.2s ease-out infinite}

/* Profile close btn */
.profileclose{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);cursor:pointer;transition:background .18s,color .18s;
}
@media(hover:hover){.profileclose:hover{background:rgba(255,255,255,.1);color:var(--text)}}
.profileclose:active{transform:scale(.94)}

/* Return to parking banner */
.parkingbanner{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:18px;
  background:rgba(41,199,172,.12);border:1px solid rgba(41,199,172,.28);
  box-shadow:0 8px 28px rgba(41,199,172,.1);
  cursor:pointer;margin-bottom:4px;
  transition:background .18s,border-color .18s;
}
@media(hover:hover){.parkingbanner:hover{background:rgba(41,199,172,.18);border-color:rgba(41,199,172,.42)}}
.parkingbanner:active{transform:scale(.98)}
.parkingbannerdot{
  width:10px;height:10px;border-radius:50%;
  background:var(--brand-2);box-shadow:0 0 10px var(--brand-2);
  flex-shrink:0;animation:homePulse 1.8s ease-in-out infinite;
}

/* ===== SLIDE-UP MENU OVERLAY ===== */
.menuoverlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;animation:menuFadeIn .22s ease forwards}
@keyframes menuFadeIn{to{opacity:1}}
.menupanel{
  position:fixed;left:0;right:0;bottom:0;z-index:51;
  background:rgba(10,16,24,.97);
  border:1px solid rgba(255,255,255,.12);border-bottom:none;
  border-radius:28px 28px 0 0;
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  box-shadow:0 -12px 60px rgba(0,0,0,.5);

  animation:menuSlideUp .3s cubic-bezier(.34,1.28,.64,1) forwards;
}
@keyframes menuSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.menuhandle{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.18);margin:14px auto 6px}
.menuheader{padding:14px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:14px}
.menuavtlg{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:17px;font-weight:700;border:2px solid;flex-shrink:0}
.menuusername{font-size:17px;font-weight:700;letter-spacing:-.01em}
.menuuseremail{font-size:12px;color:var(--muted);margin-top:2px}
.menulist{padding:10px 12px}
.menuitem{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:15px 12px;border-radius:18px;
  background:none;border:none;color:var(--text);
  cursor:pointer;text-align:left;font-size:15px;font-weight:600;
  transition:background .15s;
}
@media(hover:hover){.menuitem:hover{background:rgba(255,255,255,.06)}}
.menuitem:active{background:rgba(255,255,255,.08);transform:scale(.99)}
.menuitemicon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;flex-shrink:0}
.menuitemsub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}
.menuitem.danger{color:var(--danger)}
.menudivider{height:1px;background:rgba(255,255,255,.07);margin:6px 12px}

/* ===== LOT SELECTION ===== */
.lotcard{
  display:flex;align-items:center;gap:16px;
  width:100%;padding:18px 16px;border-radius:22px;

<body>
<div id="splash" aria-hidden="true">
  <img id="splash-logo" src="ParkWise logo.png" alt="ParkWise">
</div>
<div class="orb orb1" aria-hidden="true"></div>
<div class="orb orb2" aria-hidden="true"></div>
<div class="orb orb3" aria-hidden="true"></div>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY = "parkwise-mobile-state-v5";
const TOKEN_KEY = "parkwise-token-v1";
let GOOGLE_CLIENT_ID = '';

async function fetchConfig() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) return;
    const cfg = await res.json();
    GOOGLE_CLIENT_ID = cfg.googleClientId || '';
  } catch {}
}

let _loginTab = "signin"; // "signin" | "register"
let _menuOpen = false;

const LOTS = [
  { id: "campus", name: "Exelerator Demo Lot", address: "Exelerator Campus, Level 1", icon: "🅿️", distance: "0.1 km", total: 27 },
];

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

async function apiCall(path, opts = {}) {
  const token = getToken();
  const headers = { "Content-Type": "application/json", ...(token ? { Authorization: "Bearer " + token } : {}) };
  const res = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

// Live status from backend — overrides hardcoded defaults when connected
let _apiStatuses = {};
// Spots reserved by the app (assigned but car not yet detected by CV)
let _reservedSpots = new Set();

const SV = { w: 300, h: 440 };
const ISSUE_OPTIONS = [
  {
    id: "occupied",
    icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    title: "Spot already occupied",
    tone: "#ff8a9a"
  },
  {
    id: "blocked",
    icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    title: "Access blocked",
    tone: "#ffd28a"
  },
  {
    id: "damaged",
    icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>`,
    title: "Damaged surface",
    tone: "#ffb84d"
  },
  {
    id: "spill",
    icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>`,
    title: "Water or spill hazard",
    tone: "#8bcfff"
  }
];
const VEHICLES = {
  regular: {
    icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3v-5l2.5-6h11L19 12v5h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M9 17h6M5 12h14"/></svg>`,
    label: "Regular",
    helper: "Best overall availability"
  },
  accessible: {
    icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="4.5" r="1.5"/><path d="M9 9h6l1 4H8zm-1 4l-1 6h12l-1-6"/><path d="M10 19a3 3 0 100 0"/></svg>`,
    label: "Accessible",
    helper: "Priority spaces near access"
  },
  ev: {
    icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
    label: "Electric",
    helper: "Charging-compatible spaces"
  }
};

function createSpots() {
  const spots = [];
  const add = (id, row, col, type, defStatus, x, y, w, h) => {
    let status;
    if (_reservedSpots.has(id)) {
      // Reserved by app: stay reserved unless CV confirms car arrived
      status = _apiStatuses[id] === "occupied" ? "occupied" : "reserved";
    } else {
      status = _apiStatuses[id] !== undefined ? _apiStatuses[id] : defStatus;
    }
    spots.push({ id, row, col, type, status, x, y, w, h });
  };

  // Left wall - 10 spots (top to bottom, horizontal rects)
  const SY = 32, DY = 37;
  const lTypes = ["regular","regular","regular","regular","regular","regular","regular","regular","accessible","accessible"];
  for (let i = 0; i < 10; i++) {
    add(`L${String(i+1).padStart(2,"0")}`, "L", i, lTypes[i], "free", 7, SY + i*DY, 38, 17);
  }

  // Right wall - 10 spots (top to bottom, horizontal rects)
  const rTypes = ["accessible","accessible","regular","regular","regular","ev","regular","regular","accessible","accessible"];
  for (let i = 0; i < 10; i++) {
    add(`R${String(i+1).padStart(2,"0")}`, "R", i, rTypes[i], "free", 255, SY + i*DY, 38, 17);
  }

  // Center upper island - single column of 3 spots
  const mTypes = ["accessible","regular","regular"];
  for (let i = 0; i < 3; i++) {
    add(`M${String(i+1).padStart(2,"0")}`, "M", i, mTypes[i], "free", 133, 80 + i*42, 34, 19);
  }

  // Center lower island - single column of 4 spots
  const nTypes = ["regular","regular","regular","regular"];
  for (let i = 0; i < 4; i++) {
    add(`N${String(i+1).padStart(2,"0")}`, "N", i, nTypes[i], "free", 133, 240 + i*40, 34, 19);
  }

  return spots;
}

function initialState() {
  return {
    screen: "welcome",
    previous: null,
    user: null,
    guestMode: false,
    vehicleType: "regular",
    assignedSpotId: null,
    selectedLotId: "campus",
    spots: createSpots(),
    issueId: null,
    reassigned: false,
    timerStart: null,
    timerValue: "00:00:00",
    sessionActive: false,
    history: [],
    liveTick: Date.now(),
    activityFeed: [
      "Entry gate synced 14 seconds ago",
      "2 charging spots currently open",
      "North ramp traffic is clear"
    ]
  };
}

let state = hydrateState();
let timerHandle = null;
let clockHandle = null;
let liveHandle = null;
let toastHandle = null;

function hydrateState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialState();
    const parsed = JSON.parse(raw);
    return {
      ...initialState(),
      ...parsed,
      spots: Array.isArray(parsed.spots) ? parsed.spots : createSpots()
    };
  } catch (error) {
    return initialState();
  }
}

function persistState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function nowTime() {
  const now = new Date();
  return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function getAssignedSpot() {
  return state.spots.find((spot) => spot.id === state.assignedSpotId) || null;
}

function freeSpots() {
  return state.spots.filter((spot) => spot.status === "free");
}

function freeByType(type) {
  return state.spots.filter((spot) => spot.status === "free" && spot.type === type);
}

function occupiedCount() {
  return state.spots.filter((spot) => spot.status === "occupied").length;
}

function availabilityPercent() {
  return Math.round((freeSpots().length / state.spots.length) * 100);
}

function assignSpot(type) {
  const candidates = freeByType(type);
  if (!candidates.length) return null;
  const spot = candidates[Math.floor(Math.random() * candidates.length)];
  _reservedSpots.add(spot.id);
  state.spots = createSpots();
  return spot;
}

function releaseSpot(spotId) {
  _reservedSpots.delete(spotId);
  state.spots = createSpots();
}

function markTaken(spotId) {
  _reservedSpots.add(spotId);
  state.spots = createSpots();
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showToast(message) {
  const toast = document.getElementById("toast");
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add("show");
  window.clearTimeout(toastHandle);
  toastHandle = window.setTimeout(() => toast.classList.remove("show"), 2600);
}

function setScreen(screen) {
  _menuOpen = false;
  state.previous = state.screen;
  state.screen = screen;
  persistState();
  render();
}

function goBack() {
  if (!state.previous) return;
  state.screen = state.previous;
  state.previous = null;
  persistState();
  render();
}

function updateTimer() {
  if (!state.timerStart) {
    state.timerValue = "00:00:00";
    return;
  }
  const elapsed = Math.max(0, Math.floor((Date.now() - state.timerStart) / 1000));
  const hours = String(Math.floor(elapsed / 3600)).padStart(2, "0");
  const minutes = String(Math.floor((elapsed % 3600) / 60)).padStart(2, "0");
  const seconds = String(elapsed % 60).padStart(2, "0");
  state.timerValue = `${hours}:${minutes}:${seconds}`;
}

function ensureTimer() {
  window.clearInterval(timerHandle);
  if (!state.sessionActive || !state.timerStart) return;
  updateTimer();
  timerHandle = window.setInterval(() => {
    updateTimer();
    const timer = document.getElementById("timer");
    if (timer) timer.textContent = state.timerValue;
    persistState();
  }, 1000);
}

function startSession() {
  const spot = getAssignedSpot();
  if (spot && Object.keys(_apiStatuses).length > 0) {
    if (_apiStatuses[spot.id] !== "occupied") {
      showToast("Car not detected at " + spot.id + " yet — wait a moment and try again.");
      return;
    }
  }
  if (!state.timerStart) state.timerStart = Date.now();
  state.sessionActive = true;
  updateTimer();
  ensureTimer();
  persistState();
  setScreen("parking");
  vibrate([18, 30, 18]);
}

async function endSession() {
  window.clearInterval(timerHandle);
  timerHandle = null;
  if (state.assignedSpotId) _reservedSpots.delete(state.assignedSpotId);
  if (getToken()) {
    apiCall("/api/history", {
      method: "POST",
      body: JSON.stringify({
        spot_id: state.assignedSpotId || "?",
        vehicle_type: state.vehicleType,
        duration: state.timerValue,
        started_at: state.timerStart,
        ended_at: Date.now(),
        lot_id: state.selectedLotId || "campus"
      })
    }).catch(() => {});
  }
  const savedUser = state.user;
  const savedVehicleType = state.vehicleType;
  state = initialState();
  state.user = savedUser;
  state.vehicleType = savedVehicleType;
  state.screen = "welcome";
  state.spots = createSpots();
  persistState();
  render();
  showToast("Session ended. See you next time!");
}

function iconForSpotType(type) {
  if (type === "ev") return "EV";
  if (type === "accessible") return "AC";
  return "RG";
}

function spotTint(type) {
  if (type === "ev") return "var(--ev)";
  if (type === "accessible") return "var(--accent)";
  return "var(--success)";
}

function spotCenter(spot) {
  return { cx: spot.x + spot.w / 2, cy: spot.y + spot.h / 2 };
}

function navPath(spot) {
  const { cx, cy } = spotCenter(spot);
  // Driving lane centers: left=60, right=240, bottom entry=150,430
  if (spot.row === "L") return `M 150,430 L 60,430 L 60,${cy}`;
  if (spot.row === "R") return `M 150,430 L 240,430 L 240,${cy}`;
  if (spot.row === "M") return `M 150,430 L 60,430 L 60,${cy} L ${cx},${cy}`;
  if (spot.row === "N") return `M 150,430 L 60,430 L 60,${cy} L ${cx},${cy}`;
  return `M 150,430 L 60,430 L 60,${cy}`;
}

function routeSteps(spot) {
  const steps = ["Enter the lot from the main entrance at the bottom."];
  if (spot.row === "L") {
    steps.push("Turn left and head up along the left side.");
    steps.push(`Spot ${spot.id} is on the left wall, position ${spot.col + 1} from the top.`);
  } else if (spot.row === "R") {
    steps.push("Turn right and head up along the right side.");
    steps.push(`Spot ${spot.id} is on the right wall, position ${spot.col + 1} from the top.`);
  } else if (spot.row === "M") {
    steps.push("Turn left and drive up toward the upper center island.");
    steps.push(`Spot ${spot.id} is position ${spot.col + 1} on the upper island.`);
  } else {
    steps.push("Turn left and drive toward the lower center island.");
    steps.push(`Spot ${spot.id} is position ${spot.col + 1} on the lower island.`);
  }
  steps.push(`Look for the live beacon and park at ${spot.id}.`);
  return steps;
}

function mapSvg(activeSpotId, includeRoute, animateRoute) {
  const activeSpot = state.spots.find((spot) => spot.id === activeSpotId);
  let svg = `<svg viewBox="0 0 ${SV.w} ${SV.h}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Parking lot map">`;

  // Outer boundary - U-shape (open at top)
  svg += `<path d="M 3,8 L 3,418 Q 3,437 22,437 L 278,437 Q 297,437 297,418 L 297,8" fill="#071017" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>`;

  // Center upper island background (3 spots)
  svg += `<rect x="127" y="72" width="46" height="136" rx="8" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.08)" stroke-width="0.8"/>`;

  // Center lower island background (4 spots)
  svg += `<rect x="127" y="232" width="46" height="176" rx="8" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.08)" stroke-width="0.8"/>`;

  // Entry marker at bottom center
  svg += `<rect x="138" y="432" width="24" height="5" rx="2" fill="rgba(41,199,172,.92)"/>`;
  svg += `<text x="150" y="426" text-anchor="middle" font-size="7" fill="rgba(41,199,172,.9)" font-family="IBM Plex Mono,monospace">ENTRY</text>`;

  // Lane direction arrows (left lane going up, right lane going down)
  svg += `<text x="68" y="260" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.12)" font-family="IBM Plex Mono,monospace" transform="rotate(-90 68 260)">&#9650; &#9650; &#9650; &#9650;</text>`;
  svg += `<text x="232" y="200" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.12)" font-family="IBM Plex Mono,monospace" transform="rotate(90 232 200)">&#9650; &#9650; &#9650; &#9650;</text>`;

  // Draw all spots
  state.spots.forEach((spot) => {
    const { x, y, w, h } = spot;
    const active = spot.id === activeSpotId;
    let fill = "rgba(119,229,136,.08)";
    let stroke = "rgba(119,229,136,.22)";

    if (spot.status === "occupied") {
      fill = "rgba(255,106,124,.11)";
      stroke = "rgba(255,106,124,.28)";
    }
    if (spot.type === "ev" && spot.status === "free") {
      fill = "rgba(124,199,255,.12)";
      stroke = "rgba(124,199,255,.34)";
    }
    if (spot.type === "accessible" && spot.status === "free") {
      fill = "rgba(255,184,77,.12)";
      stroke = "rgba(255,184,77,.36)";
    }
    if (active) {
      fill = "rgba(41,199,172,.34)";
      stroke = "#67e8c7";
    }

    svg += `<rect data-spot="${spot.id}" x="${x}" y="${y}" width="${w}" height="${h}" rx="2" fill="${fill}" stroke="${stroke}" stroke-width=".8"/>`;

    if (active) {
      const cx = x + w / 2;
      const cy = y + h / 2;
      svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="#67e8c7"/>`;
      svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="none" stroke="#67e8c7" stroke-width="1.2"><animate attributeName="r" values="4;13;4" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".9;0;.9" dur="1.8s" repeatCount="indefinite"/></circle>`;
    } else if (spot.type === "ev" && spot.status === "free") {
      svg += `<text x="${x + w / 2}" y="${y + h / 2 + 3}" text-anchor="middle" font-size="6" fill="rgba(124,199,255,.78)" font-family="IBM Plex Mono,monospace">EV</text>`;
    } else if (spot.type === "accessible") {
      svg += `<text x="${x + w / 2}" y="${y + h / 2 + 3}" text-anchor="middle" font-size="6" fill="rgba(255,184,77,.8)" font-family="IBM Plex Mono,monospace">AC</text>`;
    }
  });

  // Navigation route
  if (includeRoute && activeSpot) {
    const path = navPath(activeSpot);
    svg += `<path d="${path}" stroke="rgba(41,199,172,.18)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    if (animateRoute) {
      svg += `<path d="${path}" stroke="#67e8c7" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 5" stroke-dashoffset="13"><animate attributeName="stroke-dashoffset" from="13" to="0" dur=".8s" repeatCount="indefinite"/></path>`;
    } else {
      svg += `<path d="${path}" stroke="#67e8c7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 4"/>`;
    }
  }

  svg += `</svg>`;
  return svg;
}

function _buildUser(name, email, phone) {
  const initials = name.trim().split(" ").map(w => w[0].toUpperCase()).slice(0, 2).join("");
  const palette = ["#29c7ac", "#ffb84d", "#7cc7ff", "#77e588", "#ff9a6c"];
  const color = palette[email.split("").reduce((a, c) => a + c.charCodeAt(0), 0) % palette.length];
  return { name: name.trim(), email: email.trim().toLowerCase(), phone: phone.trim(), initials, color };
}

function _doLogin(user) {
  state.user = user;
  persistState();
  vibrate([20, 40, 20]);
  state.screen = state.sessionActive ? "parking" : "welcome";
  render();
  if (state.sessionActive) ensureTimer();
}

  _loginTab = tab;

async function submitSignIn() {
  const email = (document.getElementById("inp-email") || {}).value || "";
  const password = (document.getElementById("inp-password") || {}).value || "";
  if (!email.trim() || !password) { showToast("Please fill in all fields."); return; }
  try {
    const data = await apiCall("/api/auth/login", { method: "POST", body: JSON.stringify({ email, password }) });
    setToken(data.token);
    const u = data.user;
    _doLogin(_buildUser(u.name, u.email, u.phone || ""));
  } catch (err) {
    showToast(err.message || "Sign in failed.");
  }
}

async function submitRegister() {
  const name = (document.getElementById("inp-name") || {}).value || "";
  const email = (document.getElementById("inp-email") || {}).value || "";
  const password = (document.getElementById("inp-password") || {}).value || "";
  const phone = (document.getElementById("inp-phone") || {}).value || "";
  if (!name.trim()) { showToast("Please enter your name."); return; }
  if (!email.trim() || !email.includes("@")) { showToast("Please enter a valid email."); return; }
  if (password.length < 6) { showToast("Password must be at least 6 characters."); return; }
  try {
    const data = await apiCall("/api/auth/register", { method: "POST", body: JSON.stringify({ name, email, password, phone }) });
    setToken(data.token);
    const u = data.user;
    _doLogin(_buildUser(u.name, u.email, u.phone || ""));
  } catch (err) {
    showToast(err.message || "Registration failed.");
  }
}

function signOut() {
  clearToken();

  const fresh = initialState();

  state.spots = createSpots();

let _googleInitialized = false;

function initGoogleSignIn() {
  if (!GOOGLE_CLIENT_ID) return;
  if (!window.google?.accounts?.id) {
    if (state.screen === 'login') setTimeout(initGoogleSignIn, 400);
    return;
  }
  if (_googleInitialized) return;
  _googleInitialized = true;
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
  });
}

function triggerGoogleSignIn() {
  if (!GOOGLE_CLIENT_ID || !window.google?.accounts?.id) {
    showToast('Google Sign-In is loading, please try again.');
    return;
  }
  // Use a hidden rendered button so it always opens a reliable popup
  let container = document.getElementById('_gsi_hidden');
  if (!container) {
    container = document.createElement('div');
    container.id = '_gsi_hidden';
    container.style.cssText = 'position:fixed;top:-999px;left:-999px;width:200px;height:50px;overflow:hidden;';
    document.body.appendChild(container);
  }
  container.innerHTML = '';
  google.accounts.id.renderButton(container, { size: 'large', type: 'standard', text: 'continue_with' });
  setTimeout(() => {
    const btn = container.querySelector('div[role="button"]') || container.querySelector('button');
    if (btn) btn.click();
    else google.accounts.id.prompt();
  }, 80);
}

async function handleGoogleCredential(response) {
  try {
    const data = await apiCall('/api/auth/google', {
      method: 'POST',
      body: JSON.stringify({ idToken: response.credential })
    });
    setToken(data.token);
    const u = data.user;
    _doLogin(_buildUser(u.name, u.email, u.phone || ''));
  } catch (err) {
    showToast(err.message || 'Google sign-in failed.');
  }
}

function continueAsGuest() {
  state.guestMode = true;
  persistState();
  setScreen('welcome');
}

function welcomeScreen() {
  const free = freeSpots().length;
  const pct = availabilityPercent();
  const firstName = state.user ? state.user.name.split(" ")[0] : null;
  return `
    <div class="stack">
      <section class="homebrandstage fade" aria-label="ParkWise home">
        <div class="homebrandlogo">
          <img src="ParkWise logo.png" alt="ParkWise">
        </div>
        ${firstName ? `<div class="welgreeting">Hey, ${firstName}! 👋</div>` : ""}
        <div class="hometagline">
          <span>Find Parking.</span>
          <span>Fast.</span>
        </div>
        <p class="welsubtitle">AI-powered spot assignment.<br>Real-time lot visibility.</p>
        <button class="homebrandcta" onclick="setScreen('lots')">
          Get Started
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </section>
    </div>
  `;
}

function availabilityScreen() {
  const free = freeSpots().length;
  const total = state.spots.length;
  const percent = availabilityPercent();
  const regFree = freeByType("regular").length;
  const evFree = freeByType("ev").length;
  const acFree = freeByType("accessible").length;

  return `
    ${topBar()}
    <div class="stack fill">

      <section class="card fade">
        <div class="row space" style="margin-bottom:20px">
          <div class="eyebrow" style="margin-bottom:0"><span class="dot"></span>Live Availability</div>
          <span class="pill live" style="font-size:11px;padding:6px 10px"><span class="dot"></span>Synced</span>
        </div>
        <div style="display:flex;align-items:flex-end;gap:16px">
          <div class="availnum" id="live-free-label">${free}</div>
          <div style="padding-bottom:13px;flex:1;min-width:0">
            <div style="font-size:15px;font-weight:600;color:var(--text)">spots available</div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px">
              <span id="live-avail-pct">${percent}%</span> of ${total} &nbsp;·&nbsp; <span id="live-occ-label">${occupiedCount()}</span> occupied
            </div>
          </div>
        </div>
        <div class="availbar" style="margin-top:16px">
          <div class="availbarfill" id="live-avail-bar" style="width:${percent}%"></div>
        </div>
        <div class="availtypes">
          <div class="availtype reg">
            <div class="availicon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3v-5l2.5-6h11L19 12v5h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg></div>
            <strong>${regFree}</strong>
            <span>Regular</span>
          </div>
          <div class="availtype ev">
            <div class="availicon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
            <strong>${evFree}</strong>
            <span>Electric</span>
          </div>
          <div class="availtype ac">
            <div class="availicon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="4.5" r="1.5"/><path d="M9 9h6l1 4H8zm-1 4l-1 6h12l-1-6"/></svg></div>
            <strong>${acFree}</strong>
            <span>Accessible</span>
          </div>
        </div>
      </section>

      <section class="card fade">
        <div class="eyebrow" style="margin-bottom:16px"><span class="dot"></span>Choose Vehicle Type</div>
        <div class="vehlist">
          ${Object.entries(VEHICLES).map(([key, vehicle]) => {
            const count = freeByType(key).length;
            const sel = state.vehicleType === key;
            return `
              <button class="vehrow ${sel ? "selected" : ""}" onclick="selectVehicle('${key}')">
                <div class="vehrowicon">${vehicle.icon}</div>
                <div class="vehrowinfo">
                  <div class="vehrowlabel">${vehicle.label}</div>
                  <div class="vehrowmeta">${vehicle.helper}</div>
                </div>
                <div class="vehrowcount">
                  <strong>${count}</strong>
                  <span>free</span>
                </div>
                <svg class="vehrowarrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            `;
          }).join("")}
        </div>
      </section>

    </div>
  `;
}

function assignedScreen() {
  const spot = getAssignedSpot();
  if (!spot) return availabilityScreen();

  return `
    ${topBar()}
    <div class="stack">
      <section class="hero fade">
        <div class="row space">
          <div class="eyebrow" style="margin-bottom:0"><span class="dot"></span>${state.reassigned ? "Reassigned Spot" : "Spot Confirmed"}</div>
          <span class="pill ${state.reassigned ? "warn" : "ok"}">${state.reassigned ? "Updated route" : "Ready"}</span>
        </div>
        <div class="spotid" style="margin-top:12px">${spot.id}</div>
        <div class="chips" style="margin-top:14px">
          <span class="chip">Row ${spot.row}</span>
          <span class="chip">Column ${spot.col + 1}</span>
          <span class="chip" style="color:${spotTint(spot.type)}">${iconForSpotType(spot.type)} ${VEHICLES[spot.type].label}</span>
        </div>
      </section>

      <section class="card fade">
        <div class="row space" style="margin-bottom:12px">
          <div class="sectiontitle" style="margin-bottom:0">Lot Map</div>
          <span class="pill live">Beacon active</span>
        </div>
        <div class="mapwrap">${mapSvg(spot.id, false, false)}</div>
      </section>

      <section class="card fade">
        <div class="sectiontitle">Why this spot</div>
        <div class="helper">ParkWise matched ${spot.id} based on your selected vehicle type, current lot load, and the fastest route from the active entrance lane.</div>
      </section>
    </div>
  `;
}

function navigationScreen() {
  const spot = getAssignedSpot();
  if (!spot) return assignedScreen();
  const steps = routeSteps(spot);

  return `
    ${topBar()}
    <div class="stack">
      <section class="card fade">
        <div class="row space" style="margin-bottom:12px">
          <div>
            <div class="sectiontitle" style="margin-bottom:6px">Turn By Turn</div>
            <div style="font-size:22px;font-weight:700;letter-spacing:-.05em">Navigate to ${spot.id}</div>
          </div>
          <span class="pill live">Route live</span>
        </div>
        <div class="mapwrap">${mapSvg(spot.id, true, true)}</div>
      </section>

      <section class="card fade">
        <div class="sectiontitle">Directions</div>
        <div class="route">
          ${steps.map((step, index) => `
            <div class="step">
              <div class="stepnum">${index + 1}</div>
              <div class="steptext">${step}</div>
            </div>
          `).join("")}
        </div>
      </section>
    </div>
  `;
}

function parkingScreen() {
  const spot = getAssignedSpot();
  return `
    ${topBar()}
    <div class="stack">
      <section class="hero fade">
        <div class="row space">
          <div class="eyebrow" style="margin-bottom:0"><span class="dot"></span>Active Session</div>
          <span class="pill ok">Parked</span>
        </div>
        <div style="margin-top:18px" class="timer" id="timer">${state.timerValue}</div>
        <div class="subtitle" style="margin-top:8px">Timer started at ${state.timerStart ? new Date(state.timerStart).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "--:--"}.</div>
      </section>

      <section class="metrics fade">
        <div class="metric">
          <div class="metriclabel">Your Spot</div>
          <div class="metricvalue small monocode">${spot ? spot.id : "--"}</div>
        </div>
        <div class="metric">
          <div class="metriclabel">Row</div>
          <div class="metricvalue">${spot ? spot.row : "--"}</div>
        </div>
        <div class="metric">
          <div class="metriclabel">Type</div>
          <div class="metricvalue small">${spot ? iconForSpotType(spot.type) : "--"}</div>
        </div>
      </section>

      <section class="card fade">
        <div class="sectiontitle">Session Status</div>
        <div class="helper">Your parking session is active. You can reopen the route to return to the car later or report a problem if the assigned place is blocked.</div>
      </section>
    </div>
  `;
}

function issueScreen() {
  const spot = getAssignedSpot();
  return `
    ${topBar()}
    <div class="stack">
      <section class="card fade">
        <div class="sectiontitle">Report An Issue</div>
        <div class="helper">${spot ? `Tell ParkWise what happened at ${spot.id} and we will assign a new matching spot.` : "Choose the issue type below."}</div>
      </section>

      ${ISSUE_OPTIONS.map((issue) => `
        <button class="issue fade ${state.issueId === issue.id ? "selected" : ""}" onclick="selectIssue('${issue.id}')">
          <div class="issueicon" style="background:${issue.tone}20;color:${issue.tone}">${issue.icon}</div>
          <div class="issuecopy">
            <strong>${issue.title}</strong>
            <span>Tap to use this reason for reassignment.</span>
          </div>
          <div class="monocode" style="color:${state.issueId === issue.id ? issue.tone : "var(--faint)"}">${state.issueId === issue.id ? "OK" : ">"}</div>
        </button>
      `).join("")}

      ${state.issueId ? `
        <div class="notice fade">ParkWise will mark ${spot ? spot.id : "this spot"} as unavailable for this session and search for the next best ${spot ? VEHICLES[spot.type].label.toLowerCase() : "matching"} space.</div>
      ` : ""}
    </div>
  `;
}

function bottomBar() {
  const spot = getAssignedSpot();

  if (state.screen === "login") return "";
  if (state.screen === "welcome") return "";

  if (state.screen === "profile") return "";

  if (state.screen === "lots") {
    const disabled = !state.selectedLotId;
    return wrapActions(`
      <button class="iconbtn" onclick="setScreen('welcome')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="primary" onclick="enterLot()" ${disabled ? `disabled style="opacity:.45"` : ""}>Enter Lot</button>
    `);
  }

  if (state.screen === "availability") {
    return wrapActions(`
      <button class="iconbtn" onclick="setScreen('lots')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="primary" onclick="findSpot()">Assign My Spot</button>
    `);
  }

  if (state.screen === "assigned" && spot) {
    return wrapActions(`
      <button class="iconbtn" onclick="setScreen('availability')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="secondary" onclick="setScreen('issue')">Report Issue</button>
      <button class="primary" onclick="setScreen('navigation')">Start Navigation</button>
    `);
  }

  if (state.screen === "navigation" && spot) {
    return wrapActions(`
      <button class="iconbtn" onclick="setScreen('assigned')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="primary" onclick="startSession()">I Have Parked</button>
    `);
  }

  if (state.screen === "findcar") {
    return wrapActions(`
      <button class="secondary" onclick="goBack()">Back</button>
    `);
  }

  if (state.screen === "parking") {
    return wrapActions(`
      <button class="secondary" onclick="setScreen('findcar')">Find My Car</button>
      <button class="ghost" onclick="endSession()">End Session</button>
    `);
  }

  if (state.screen === "issue") {
    return wrapActions(`
      <button class="iconbtn" onclick="goBack()" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="primary" onclick="reassignSpot()" ${state.issueId ? "" : "disabled"} style="${state.issueId ? "" : "opacity:.45"}">Reassign Me</button>
    `);
  }

  return "";
}

function wrapActions(content) {
  return `<div class="floatingbar"><div class="floatinginner">${content}</div></div>`;
}

function renderScreen() {
  switch (state.screen) {
    case "login":        return loginScreen();
    case "welcome":      return welcomeScreen();
    case "lots":         return lotScreen();
    case "availability": return availabilityScreen();
    case "assigned":     return assignedScreen();
    case "navigation":   return navigationScreen();
    case "parking":      return parkingScreen();
    case "issue":        return issueScreen();
    case "profile":      return profileScreen();
    case "history":      return historyScreen();
    case "findcar":      return findCarScreen();
    default:             return state.user ? welcomeScreen() : loginScreen();
  }
}

function render() {
  _menuOpen = _menuOpen && !!state.user; // auto-close if logged out
  const root = document.getElementById("root");
  root.innerHTML = `
    <main class="app">
      <section class="screen">${renderScreen()}</section>
      ${bottomBar()}
    </main>
    ${menuOverlay()}
  `;
  updateClock();
  ensureTimer();
  if (state.screen === 'login') initGoogleSignIn();
}

function updateClock() {
  const target = document.getElementById("status-time");
  if (target) target.textContent = nowTime();
}

function selectVehicle(type) {
  state.vehicleType = type;
  persistState();
  vibrate(14);
  render();
}

function selectIssue(id) {
  state.issueId = id;
  persistState();
  vibrate(12);
  render();
}

function findSpot() {
  const spot = assignSpot(state.vehicleType);
  if (!spot) {
    showToast(`No ${VEHICLES[state.vehicleType].label.toLowerCase()} spots are free right now.`);
    return;
  }
  state.assignedSpotId = spot.id;
  state.reassigned = false;
  state.issueId = null;
  persistState();
  vibrate([20, 40, 20]);
  setScreen("assigned");
}

function reassignSpot() {
  if (!state.issueId) return;
  const currentSpot = getAssignedSpot();
  if (currentSpot) markTaken(currentSpot.id);
  const nextSpot = assignSpot(currentSpot ? currentSpot.type : state.vehicleType);
  if (!nextSpot) {
    showToast("No matching replacement spot is available.");
    return;
  }
  state.assignedSpotId = nextSpot.id;
  state.reassigned = true;
  state.issueId = null;
  persistState();
  vibrate([14, 28, 14, 28, 14]);
  setScreen("assigned");
}

function patchSpotColors() {
  state.spots.forEach(spot => {
    const rect = document.querySelector(`rect[data-spot="${spot.id}"]`);
    if (!rect) return;
    let fill = "rgba(119,229,136,.08)", stroke = "rgba(119,229,136,.22)";
    if (spot.status === "occupied") { fill = "rgba(255,106,124,.11)"; stroke = "rgba(255,106,124,.28)"; }
    if (spot.type === "ev" && spot.status !== "occupied") { fill = "rgba(124,199,255,.12)"; stroke = "rgba(124,199,255,.34)"; }
    if (spot.type === "accessible" && spot.status !== "occupied") { fill = "rgba(255,184,77,.12)"; stroke = "rgba(255,184,77,.36)"; }
    if (spot.id === state.assignedSpotId) { fill = "rgba(41,199,172,.34)"; stroke = "#67e8c7"; }
    rect.setAttribute("fill", fill);
    rect.setAttribute("stroke", stroke);
  });
  const freeEl = document.getElementById("live-free-label");
  if (freeEl) freeEl.textContent = `${freeSpots().length}`;
  const barEl = document.getElementById("live-avail-bar");
  if (barEl) barEl.style.width = `${availabilityPercent()}%`;
  const pctEl = document.getElementById("live-avail-pct");
  if (pctEl) pctEl.textContent = `${availabilityPercent()}%`;
  const occEl = document.getElementById("live-occ-label");
  if (occEl) occEl.textContent = `${occupiedCount()}`;
}

async function loadSpotStatuses() {
  try {
    const res = await fetch("/api/spots");
    if (!res.ok) return;
    const data = await res.json();
    if (!(data.spots || []).length) return;
    const fresh = {};
    data.spots.forEach(s => { fresh[s.id] = s.status; });
    _apiStatuses = fresh;  // full replace — no stale occupied statuses
    state.spots = createSpots();
    patchSpotColors();
  } catch (e) {}
}

function connectSocket() {
  try {
    const socket = io();
    socket.on("spots:update", ({ spots }) => {
      let changed = false;
      (spots || []).forEach(s => {
        if (_apiStatuses[s.id] !== s.status) { _apiStatuses[s.id] = s.status; changed = true; }
      });
      if (!changed) return;
      state.spots = createSpots();
      patchSpotColors();
    });
  } catch (e) {}
}

function randomLiveUpdate() {
  if (state.sessionActive) return;
  if (Object.keys(_apiStatuses).length > 0) return; // real data active
  const free = freeSpots();
  const occupied = state.spots.filter((spot) => spot.status === "occupied" && spot.id !== state.assignedSpotId);
  const messages = [];

  if (free.length && Math.random() > 0.5) {
    const spot = free[Math.floor(Math.random() * free.length)];
    spot.status = "occupied";
    messages.push(`${spot.id} was just taken.`);
  } else if (occupied.length) {
    const spot = occupied[Math.floor(Math.random() * occupied.length)];
    spot.status = "free";
    messages.push(`${spot.id} opened up.`);
  }

  messages.push(`${freeByType("ev").length} EV spots currently available.`);
  messages.push(`${availabilityPercent()}% of the lot is open now.`);
  state.activityFeed = messages;
  state.liveTick = Date.now();
  persistState();

  if (state.screen === "availability" || state.screen === "welcome") {
    render();
  }
}

async function boot() {
  await fetchConfig();

  const token = getToken();
  if (token) {
    try {
      const data = await apiCall("/api/auth/me");
      const u = data.user;
      state.user = _buildUser(u.name, u.email, u.phone || "");
      state.guestMode = false;
      persistState();
    } catch {
      clearToken();
      state.user = null;
    }
  }

  // Smart routing
  if (!state.user) {
    if (state.guestMode) {
      if (state.screen === "login") state.screen = "welcome";
    } else {
      state.screen = "login";
    }
  } else if (state.sessionActive) {
    state.screen = "parking";
  } else if (state.screen === "login") {
    state.screen = "welcome";
  }

  render();

  // Fade out splash after logo has had time to land
  setTimeout(() => {
    const sp = document.getElementById("splash");
    if (!sp) return;
    sp.style.opacity = "0";
    setTimeout(() => { if (sp && sp.parentNode) sp.parentNode.removeChild(sp); }, 580);
  }, 1500);

  updateTimer();
  ensureTimer();
  clockHandle = window.setInterval(updateClock, 30000);
  liveHandle = window.setInterval(randomLiveUpdate, 12000);
  loadSpotStatuses();
  window.setInterval(loadSpotStatuses, 5000);
  connectSocket();
}

boot();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
